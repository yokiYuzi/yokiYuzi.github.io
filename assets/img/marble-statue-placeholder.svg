<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1120" role="img" aria-labelledby="title desc">
  <title id="title">Abstract marble statue placeholder</title>
  <desc id="desc">A neutral abstract neoclassical marble figure placeholder with parchment and gold tones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7eed9"/>
      <stop offset=".48" stop-color="#e4d1aa"/>
      <stop offset="1" stop-color="#b89558"/>
    </linearGradient>
    <radialGradient id="light" cx="36%" cy="18%" r="65%">
      <stop offset="0" stop-color="#fffdf3" stop-opacity=".95"/>
      <stop offset=".44" stop-color="#fff3d3" stop-opacity=".3"/>
      <stop offset="1" stop-color="#6b4418" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="marble" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".36" stop-color="#e8ddcb"/>
      <stop offset=".7" stop-color="#cdbb9d"/>
      <stop offset="1" stop-color="#f7efe4"/>
    </linearGradient>
    <filter id="stone" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.042" numOctaves="3" seed="9" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.66 0 0 0 0 0.60 0 0 0 0 0.50 0 0 0 .22 0" in="noise" result="vein"/>
      <feBlend mode="multiply" in="SourceGraphic" in2="vein"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#5b3912" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="820" height="1120" fill="url(#bg)"/>
  <rect width="820" height="1120" fill="url(#light)"/>

  <g opacity=".16" stroke="#8a5c24" stroke-width="1" fill="none">
    <circle cx="410" cy="370" r="286"/>
    <circle cx="410" cy="370" r="214"/>
    <path d="M410 80v580M120 370h580M205 165l410 410M615 165 205 575"/>
  </g>

  <g filter="url(#softShadow)">
    <!-- hair / head mass -->
    <path filter="url(#stone)" d="M456 164c-58-20-126 16-152 72-22 47-13 93 12 126 18 25 45 39 73 45 43 9 90-2 119-36 34-39 49-103 22-153-14-26-38-44-74-54Z" fill="url(#marble)"/>
    <path d="M318 247c42-56 110-77 170-52M300 292c62-35 134-33 205 7M338 350c50 28 100 29 151 5" stroke="#a18b70" opacity=".32" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- neck and torso -->
    <path filter="url(#stone)" d="M356 390c18 56 3 84-43 115-98 66-164 184-166 316h534c-7-96-54-180-133-244-59-47-104-84-89-181-30 21-70 28-103-6Z" fill="url(#marble)"/>
    <path d="M210 785c58-95 141-145 256-150 76-3 130 17 189 58" stroke="#9d876a" opacity=".35" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M276 620c94 60 226 54 311-21M250 720c92 40 201 45 324 6" stroke="#b7a68c" opacity=".28" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- arm / hand-like study -->
    <path filter="url(#stone)" d="M165 632c58-64 143-90 244-76 29 4 50 22 48 45-2 23-29 38-64 36-70-5-119 12-154 56-23 29-55 33-75 16-22-19-22-52 1-77Z" fill="url(#marble)"/>
    <path d="M254 602c40-11 82-13 126-4M218 641c64-20 125-19 184 2M190 684c55-21 112-23 171-6" stroke="#a18b70" stroke-width="6" opacity=".28" fill="none" stroke-linecap="round"/>

    <!-- book / slab -->
    <path d="M470 472 610 526 555 790 420 738Z" fill="#d7c4a2" opacity=".9"/>
    <path d="M488 494 589 534 540 755 441 718Z" fill="#efe5d3" opacity=".86"/>
    <path d="M470 472 610 526 555 790 420 738Z" stroke="#8f744f" opacity=".26" stroke-width="3" fill="none"/>
  </g>

  <g opacity=".32" fill="none" stroke="#8a5c24" stroke-width="1">
    <path d="M140 915h540"/>
    <path d="M180 950h460"/>
    <path d="M218 986h384"/>
  </g>
</svg>
