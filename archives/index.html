<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archives | Chang Wang</title>
  <meta name="description" content="Full archive of all posts and pages on Chang Wang's personal website.">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .arc-hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .arc-hero h1 {
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      color: var(--accent);
      letter-spacing: 0.1em;
      margin: 0;
    }
    .arc-hero .sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      margin-top: 0.3rem;
    }
    .arc-count-badge {
      background: var(--surface);
      border: 2px solid var(--accent);
      box-shadow: 0 0 16px var(--glow);
      padding: 0.4rem 1.1rem;
      text-align: center;
      min-width: 72px;
    }
    .arc-count-badge .num { font-size: 1.6rem; color: var(--accent); line-height: 1; }
    .arc-count-badge .lbl { font-size: 0.52rem; color: var(--muted); letter-spacing: 0.26em; text-transform: uppercase; }

    /* Year group */
    .arc-year-block {
      margin-bottom: 1.2rem;
      border: 1px solid var(--line);
      background: var(--surface);
    }
    .arc-year-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid var(--line);
      background: var(--surface-alt, var(--surface));
    }
    .arc-year-label {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .arc-year-count {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.14em;
    }

    /* Post rows */
    .arc-post-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      padding: 0.65rem 1.2rem;
      border-bottom: 1px solid var(--line);
      transition: background 0.18s, padding-left 0.18s;
    }
    .arc-post-row:last-child { border-bottom: none; }
    .arc-post-row:hover {
      background: var(--surface-alt, var(--surface));
      padding-left: 1.55rem;
    }
    .arc-post-row:hover .arc-post-title { color: var(--accent2); }
    .arc-post-date {
      flex-shrink: 0;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      min-width: 5.5rem;
    }
    .arc-post-title {
      font-size: 0.88rem;
      color: var(--accent);
      transition: color 0.18s;
    }
    .arc-post-cat {
      font-size: 0.65rem;
      color: var(--accent2);
      letter-spacing: 0.06em;
      margin-left: auto;
      flex-shrink: 0;
      white-space: nowrap;
    }
    @media (max-width: 520px) {
      .arc-post-row { flex-wrap: wrap; gap: 0.25rem; }
      .arc-post-cat { margin-left: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="/">Chang Wang</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/resume/">Resume</a>
        <a href="/archives/">Archives</a>
        <a href="/blog/">Blog</a>
        <a href="/visitors/">Visitors</a>
        <a href="/guestbook/">Guestbook</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="arc-hero">
      <div>
        <h1>// ARCHIVES</h1>
        <p class="sub">All posts, sorted by year.</p>
      </div>
      <div class="arc-count-badge">
        <div class="num" id="arc-total">—</div>
        <div class="lbl">Posts</div>
      </div>
    </div>

    <div id="arc-container">
      <p style="color:var(--muted);font-size:0.82rem;letter-spacing:0.1em;">Loading...</p>
    </div>
  </main>

  <footer>
    <div class="container">© 2026 Chang Wang</div>
  </footer>

  <script>
  (function () {
    fetch('/blog/posts.json', { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (posts) {
        var valid = posts.filter(function (p) { return p.path && p.path !== '#'; });
        document.getElementById('arc-total').textContent = valid.length || '0';

        if (!valid.length) {
          document.getElementById('arc-container').innerHTML =
            '<p style="color:var(--muted)">暂无文章</p>';
          return;
        }

        /* group by year */
        var byYear = {};
        valid.forEach(function (p) {
          var year = (p.date || '').slice(0, 4) || 'Unknown';
          if (!byYear[year]) byYear[year] = [];
          byYear[year].push(p);
        });

        var years = Object.keys(byYear).sort(function (a, b) { return b - a; });
        var html = '';
        years.forEach(function (yr) {
          var ps = byYear[yr];
          html += '<div class="arc-year-block">';
          html += '<div class="arc-year-header">';
          html += '<span class="arc-year-label">' + yr + '</span>';
          html += '<span class="arc-year-count">// ' + ps.length + ' post' + (ps.length > 1 ? 's' : '') + '</span>';
          html += '</div>';
          ps.forEach(function (p) {
            var cat = p.category ? '<span class="arc-post-cat">[' + p.category + ']</span>' : '';
            html += '<a class="arc-post-row" href="' + p.path + '">';
            html += '<span class="arc-post-date">' + (p.date || '') + '</span>';
            html += '<span class="arc-post-title">' + (p.title || 'Untitled') + '</span>';
            html += cat;
            html += '</a>';
          });
          html += '</div>';
        });

        document.getElementById('arc-container').innerHTML = html;
      })
      .catch(function () {
        document.getElementById('arc-container').innerHTML =
          '<p style="color:var(--muted)">加载失败</p>';
      });
  })();
  </script>
  <script src="/js/theme.js"></script>
</body>
</html>
