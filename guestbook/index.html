<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guestbook | Chang Wang</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    /* ══════════════════════════════════════════
       HERO
    ══════════════════════════════════════════ */
    .gb-hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.6rem;
    }
    .gb-hero h1 {
      font-size: clamp(1rem, 2.5vw, 1.55rem);
      color: var(--accent);
      letter-spacing: 0.1em;
      margin: 0;
    }
    .gb-hero .sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      margin-top: 0.35rem;
    }
    .msg-count-badge {
      background: var(--surface);
      border: 2px solid var(--accent);
      box-shadow: 0 0 18px var(--glow);
      padding: 0.45rem 1.2rem;
      text-align: center;
    }
    .msg-count-badge .num {
      font-size: 1.7rem; color: var(--accent); line-height: 1;
      transition: transform 0.15s;
    }
    .msg-count-badge .lbl {
      font-size: 0.56rem; color: var(--muted);
      letter-spacing: 0.26em; text-transform: uppercase;
    }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    .gb-layout {
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 1.2rem;
      align-items: start;
    }
    @media (max-width: 780px) { .gb-layout { grid-template-columns: 1fr; } }

    /* ══════════════════════════════════════════
       FORM PANEL
    ══════════════════════════════════════════ */
    .gb-form-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 0;
      position: sticky;
      top: 1.2rem;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .gb-form-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--glow);
    }

    /* form header bar */
    .form-header {
      background: var(--accent);
      padding: 0.55rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .form-header-title {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fff;
    }
    .form-header-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7fffb0;
      box-shadow: 0 0 6px #7fffb0;
      animation: dot-blink 2s ease-in-out infinite;
    }
    @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .form-body { padding: 1.2rem 1.3rem; }

    .field { margin-bottom: 0.88rem; }
    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .field input,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      border: 1px solid var(--line);
      border-left: 2px solid transparent;
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      font-size: 0.83rem;
      padding: 0.48rem 0.72rem;
      outline: none;
      transition: border-color 0.2s, border-left-color 0.2s, box-shadow 0.2s;
      resize: none;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      border-left-color: var(--accent2);
      box-shadow: 0 0 0 2px var(--glow);
    }
    .field textarea { height: 96px; line-height: 1.65; }

    .char-counter {
      text-align: right;
      font-size: 0.63rem;
      color: var(--muted);
      margin-top: 0.22rem;
      letter-spacing: 0.07em;
    }
    .char-counter.warn { color: #e67e22; }
    .char-counter.over { color: #e74c3c; }

    /* anon row */
    .anon-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.88rem;
    }
    .anon-row input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }
    .anon-row label { font-size: 0.7rem; color: var(--muted); cursor: pointer; letter-spacing: 0.06em; }

    /* submit button */
    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.62rem 1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }
    .submit-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: none;
    }
    .submit-btn:hover:not(:disabled)::after {
      animation: btn-shine 0.55s ease;
    }
    @keyframes btn-shine {
      0%   { left: -100%; }
      100% { left: 140%; }
    }
    .submit-btn:hover:not(:disabled) { background: var(--accent2); }
    .submit-btn:disabled { opacity: 0.42; cursor: not-allowed; }
    .submit-btn.sending {
      background: var(--accent2);
      animation: sending-pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes sending-pulse { from{opacity:.7} to{opacity:1} }

    /* status */
    #submit-status {
      margin-top: 0.65rem;
      font-size: 0.74rem;
      letter-spacing: 0.1em;
      min-height: 1.15em;
      text-align: center;
    }
    #submit-status.ok   { color: #00a854; }
    #submit-status.err  { color: #e74c3c; }
    #submit-status.wait { color: var(--muted); animation: blink 1.1s infinite; }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    /* cooldown bar */
    .cooldown-bar-wrap {
      height: 2px;
      background: var(--surface-alt);
      margin-top: 0.5rem;
      display: none;
    }
    .cooldown-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1s linear;
    }

    /* ══════════════════════════════════════════
       MESSAGES PANEL
    ══════════════════════════════════════════ */
    .gb-messages-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .messages-header {
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      padding: 0.6rem 1.3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .messages-header-title {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .sort-btns { display: flex; gap: 0.35rem; }
    .sort-btn {
      background: none;
      border: 1px solid var(--line);
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 0.18rem 0.55rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sort-btn.active { border-color: var(--accent); color: #fff; background: var(--accent); }

    .messages-body { padding: 0.2rem 1.3rem 1.3rem; }

    /* ── Message card ── */
    .msg-card {
      border-bottom: 1px solid var(--surface-alt);
      padding: 1rem 0 1rem 0.8rem;
      border-left: 2px solid transparent;
      margin-left: -0.8rem;
      transition: border-left-color 0.2s, background 0.2s, padding-left 0.2s;
      animation: fadeUp 0.38s ease both;
    }
    .msg-card:first-child { padding-top: 0.7rem; }
    .msg-card:last-child { border-bottom: none; }
    .msg-card:hover {
      border-left-color: var(--accent2);
      background: linear-gradient(90deg, rgba(0,180,216,0.04), transparent 60%);
      padding-left: 1rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 0;
      color: #fff;
      font-size: 0.78rem;
      font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      position: relative;
    }
    .msg-avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .msg-name {
      font-size: 0.85rem; color: var(--text);
      font-weight: bold; letter-spacing: 0.04em;
    }
    .msg-meta {
      font-size: 0.67rem; color: var(--muted);
      letter-spacing: 0.07em;
      display: flex; align-items: center; gap: 0.45rem;
      flex-wrap: wrap;
    }
    .msg-meta-sep { opacity: 0.4; }
    .msg-flag {
      width: 16px; height: 11px;
      object-fit: cover;
      border: 1px solid var(--line);
      vertical-align: middle;
    }

    .msg-body {
      font-size: 0.83rem;
      color: var(--text);
      line-height: 1.78;
      margin: 0.32rem 0 0.6rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-actions { display: flex; align-items: center; gap: 0.8rem; }

    /* ══════════════════════════════════════════
       ★ SCI-FI LIKE BUTTON
    ══════════════════════════════════════════ */
    .like-btn {
      position: relative;
      background: none;
      border: 1px solid var(--line);
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      padding: 0.22rem 0.75rem 0.22rem 0.55rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.38rem;
      overflow: hidden;
      transition: border-color 0.25s, color 0.25s, box-shadow 0.25s;
      user-select: none;
    }
    /* hover: charge effect */
    .like-btn:hover:not(:disabled):not(.liked) {
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .like-btn:hover:not(:disabled):not(.liked)::before {
      animation: btn-charge 0.4s ease forwards;
    }
    /* liked state */
    .like-btn.liked {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,87,231,0.06);
      box-shadow: 0 0 10px rgba(0,87,231,0.2), inset 0 0 8px rgba(0,87,231,0.06);
      animation: liked-glow 2.5s ease-in-out infinite;
    }
    @keyframes liked-glow {
      0%,100% { box-shadow: 0 0 8px rgba(0,180,216,0.2), inset 0 0 6px rgba(0,87,231,0.04); }
      50%      { box-shadow: 0 0 16px rgba(0,180,216,0.45), inset 0 0 10px rgba(0,87,231,0.1); }
    }
    /* scan sweep on liked */
    .like-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,180,216,0.35), transparent);
      pointer-events: none;
    }
    .like-btn.do-scan::before {
      animation: scan-sweep 0.55s ease forwards;
    }
    @keyframes scan-sweep {
      from { left: -100%; }
      to   { left: 140%; }
    }
    @keyframes btn-charge {
      from { left: -100%; opacity: 0.5; }
      to   { left: 140%; opacity: 0; }
    }
    /* press effect */
    .like-btn:active:not(:disabled) { transform: scale(0.93); }
    /* lock icon when liked */
    .like-btn .btn-label { font-size: 0.6rem; letter-spacing: 0.12em; opacity: 0.75; }

    /* signal icon (◆) */
    .like-icon { font-size: 0.7rem; transition: transform 0.2s; }
    .like-btn:hover .like-icon { transform: scale(1.25); }
    .like-btn.liked .like-icon { color: var(--accent2); }

    /* number flip animation */
    .like-num { display: inline-block; min-width: 1.2em; text-align: center; }
    .like-num.flipping {
      animation: num-glitch 0.35s ease;
    }
    @keyframes num-glitch {
      0%   { opacity:1; transform:translateY(0); }
      20%  { opacity:0.2; transform:translateY(-3px) skewX(4deg); filter:blur(1px); }
      45%  { opacity:0.6; transform:translateY(2px) skewX(-3deg); }
      70%  { opacity:0.4; transform:translateY(-1px); filter:blur(0.5px); }
      100% { opacity:1; transform:translateY(0); filter:none; }
    }

    /* ── Particle burst (DOM-injected) ── */
    .like-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 0;
      transform: translate(-50%, -50%) rotate(45deg);
      animation: particle-fly 0.65s ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { opacity: 1; transform: translate(-50%,-50%) translate(0,0) scale(1) rotate(45deg); }
      100% { opacity: 0; transform: translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(0) rotate(45deg); }
    }

    /* Energy wave ring */
    .energy-ring {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border-radius: 50%;
      border: 1.5px solid var(--accent2);
      transform: translate(-50%, -50%) scale(0.2);
      animation: ring-expand 0.55s ease-out forwards;
    }
    @keyframes ring-expand {
      0%   { transform: translate(-50%,-50%) scale(0.2); opacity: 0.9; }
      100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
    }

    /* ══════════════════════════════════════════
       LOADING / EMPTY / MISC
    ══════════════════════════════════════════ */
    .loading-text {
      text-align: center;
      padding: 2.8rem 1rem;
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.24em;
      animation: blink 1.3s infinite;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 1.8rem; opacity: 0.28; margin-bottom: 0.6rem; }
    .empty-text { font-size: 0.78rem; letter-spacing: 0.14em; }

    .load-more-btn {
      display: block; width: 100%; margin-top: 0.8rem;
      background: none;
      border: 1px dashed var(--line);
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase;
      padding: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .load-more-btn:hover { border-color: var(--accent); color: var(--accent); border-style: solid; }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="/">Chang Wang</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/resume/">Resume</a>
        <a href="/archives/">Archives</a>
        <a href="/blog/">Blog</a>
        <a href="/visitors/">Visitors</a>
        <a href="/guestbook/">Guestbook</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- Hero -->
    <div class="gb-hero">
      <div>
        <h1>// GUESTBOOK</h1>
        <div class="sub">Leave a message &nbsp;·&nbsp; All visitors welcome</div>
      </div>
      <div class="msg-count-badge">
        <div class="num" id="msg-count">—</div>
        <div class="lbl">Messages</div>
      </div>
    </div>

    <div class="gb-layout">

      <!-- ── Left: Form ── -->
      <div class="gb-form-wrap section">
        <div class="form-header">
          <span class="form-header-title">// Transmission Panel</span>
          <div class="form-header-dot" title="Online"></div>
        </div>
        <div class="form-body">
          <div class="field">
            <label for="gb-name">Callsign *</label>
            <input type="text" id="gb-name" maxlength="40" placeholder="Your name" autocomplete="off">
          </div>

          <div class="anon-row">
            <input type="checkbox" id="gb-anon">
            <label for="gb-anon">Transmit as Anonymous</label>
          </div>

          <div class="field">
            <label for="gb-msg">Message *</label>
            <textarea id="gb-msg" maxlength="500" placeholder="Your message… (Ctrl+Enter to send)"></textarea>
            <div class="char-counter" id="char-counter">0 / 500</div>
          </div>

          <button class="submit-btn" id="submit-btn" onclick="submitMessage()">
            ▶&nbsp; TRANSMIT
          </button>
          <div id="submit-status"></div>
          <div class="cooldown-bar-wrap" id="cooldown-wrap">
            <div class="cooldown-bar" id="cooldown-bar"></div>
          </div>
        </div>
      </div>

      <!-- ── Right: Messages ── -->
      <div class="gb-messages-wrap section">
        <div class="messages-header">
          <span class="messages-header-title">// Incoming Signals</span>
          <div class="sort-btns">
            <button class="sort-btn active" id="sort-new" onclick="setSort('new')">Latest</button>
            <button class="sort-btn" id="sort-top" onclick="setSort('top')">Top</button>
          </div>
        </div>
        <div class="messages-body">
          <div id="msg-list">
            <div class="loading-text">SCANNING SIGNALS…</div>
          </div>
          <button class="load-more-btn" id="load-more-btn" style="display:none" onclick="loadMore()">
            ↓ Load More Signals
          </button>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">© 2026 Chang Wang</div>
  </footer>

<script>
/* ═══════════════════════ CONFIG ═══════════════════════ */
const FB_URL   = 'https://private-cv-web-default-rtdb.firebaseio.com';
const PAGE_SIZE = 10;
const COOLDOWN  = 3 * 60 * 1000;   /* 3 minutes */

/* ═══════════════════════ STATE ════════════════════════ */
let allMessages = [];
let displayedN  = PAGE_SIZE;
let currentSort = 'new';
let visitorGeo  = null;
let likedIds    = JSON.parse(localStorage.getItem('gb_liked') || '[]');

/* ═══════════════════════ FIREBASE ══════════════════════ */
async function fbGet(path) {
  const r = await fetch(FB_URL + path + '.json');
  return r.ok ? r.json() : null;
}
async function fbPut(path, data) {
  await fetch(FB_URL + path + '.json', {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}
async function fbPost(path, data) {
  const r = await fetch(FB_URL + path + '.json', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.ok ? r.json() : null;
}

/* ═══════════════════════ GEO ═══════════════════════════ */
async function getGeo() {
  try {
    const d = await fetch('https://ipapi.co/json/').then(r => r.json());
    if (d && d.country_code) return d;
  } catch (_) {}
  try {
    const d = await fetch('https://ipwhois.app/json/').then(r => r.json());
    if (d && d.country_code) return { country_code: d.country_code, country_name: d.country, city: d.city };
  } catch (_) {}
  return null;
}

/* ═══════════════════════ HELPERS ════════════════════════ */
function timeAgo(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60)       return 'just now';
  if (s < 3600)     return Math.floor(s/60) + 'm ago';
  if (s < 86400)    return Math.floor(s/3600) + 'h ago';
  if (s < 86400*30) return Math.floor(s/86400) + 'd ago';
  return new Date(ms).toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'});
}

function avatarLetter(name) {
  if (!name || name === 'Anonymous') return '?';
  return name.trim()[0].toUpperCase();
}

function avatarColor(name) {
  const palette = ['#0057e7','#00b4d8','#5b30f7','#e67e22','#00a854','#c0392b','#2980b9','#8e44ad'];
  if (!name || name === 'Anonymous') return '#8899aa';
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return palette[Math.abs(h) % palette.length];
}

function flagImg(cc) {
  if (!cc || cc.length !== 2) return '';
  return `<img class="msg-flag" src="https://flagcdn.com/20x15/${cc.toLowerCase()}.png"
    onerror="this.style.display='none'" alt="${cc}">`;
}

function sanitize(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ══════════════════════════════════════════════════════
   ★ SCI-FI LIKE ANIMATION
══════════════════════════════════════════════════════ */
function spawnLikeParticles(btn, isLiking) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  const size = Math.min(rect.width, rect.height);

  /* energy wave ring */
  const ring = document.createElement('div');
  ring.className = 'energy-ring';
  ring.style.cssText = `left:${cx}px; top:${cy}px; width:${size}px; height:${size}px;
    border-color: ${isLiking ? '#00b4d8' : '#8899aa'};`;
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 600);

  /* second ring (delayed) */
  if (isLiking) {
    const ring2 = document.createElement('div');
    ring2.className = 'energy-ring';
    ring2.style.cssText = `left:${cx}px; top:${cy}px; width:${size*0.7}px; height:${size*0.7}px;
      border-color:#0057e7; animation-delay:0.12s; opacity:0;`;
    document.body.appendChild(ring2);
    setTimeout(() => ring2.remove(), 750);
  }

  /* diamond particles */
  const count  = isLiking ? 8 : 5;
  const colors = isLiking
    ? ['#0057e7','#00b4d8','#5ba3ff','#00eeff','#aadeff','#ffffff']
    : ['#7799aa','#99aacc','#bbccdd'];

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist  = 18 + Math.random() * 20;
    const w     = 2 + Math.random() * 3;
    const h     = isLiking ? (2 + Math.random() * 3) : (1 + Math.random() * 2);
    const color = colors[i % colors.length];
    const delay = i * 18;

    const p = document.createElement('div');
    p.className = 'like-particle';
    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${w}px; height: ${h}px;
      background: ${color};
      box-shadow: 0 0 4px ${color};
      --dx: ${Math.cos(angle) * dist}px;
      --dy: ${Math.sin(angle) * dist}px;
      animation-delay: ${delay}ms;
      animation-duration: ${550 + Math.random() * 150}ms;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800 + delay);
  }
}

function animateLike(btn, numEl, newCount, isLiking) {
  /* press → release spring */
  btn.style.transform = 'scale(0.88)';
  setTimeout(() => { btn.style.transform = 'scale(1.06)'; }, 80);
  setTimeout(() => { btn.style.transform = ''; }, 180);

  /* particle burst */
  spawnLikeParticles(btn, isLiking);

  /* scan sweep across button */
  btn.classList.remove('do-scan');
  void btn.offsetWidth;   /* reflow to restart animation */
  btn.classList.add('do-scan');
  setTimeout(() => btn.classList.remove('do-scan'), 600);

  /* number glitch flip */
  numEl.classList.add('flipping');
  setTimeout(() => {
    numEl.textContent = newCount;
    numEl.classList.remove('flipping');
  }, 175);
}

/* ═══════════════════════ RENDER ════════════════════════ */
function renderMessages() {
  const list  = document.getElementById('msg-list');
  const slice = allMessages.slice(0, displayedN);

  if (!allMessages.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-text">NO SIGNALS RECEIVED — be the first to transmit.</div>
    </div>`;
    document.getElementById('load-more-btn').style.display = 'none';
    return;
  }

  list.innerHTML = slice.map(m => {
    const liked = likedIds.includes(m.id);
    const aColor = avatarColor(m.name);
    const loc = (m.city && m.country)
      ? `${flagImg(m.country_code)}<span>${sanitize(m.city)}, ${sanitize(m.country)}</span>`
      : (m.country_code ? `${flagImg(m.country_code)}<span>${m.country_code}</span>` : '');
    const locPart = loc ? `${loc}<span class="msg-meta-sep">·</span>` : '';

    return `<div class="msg-card" id="card-${m.id}">
      <div class="msg-header">
        <div class="msg-avatar" style="background:${aColor}">${avatarLetter(m.name)}</div>
        <div>
          <div class="msg-name">${sanitize(m.name)}</div>
          <div class="msg-meta">${locPart}<span>${timeAgo(m.ts)}</span></div>
        </div>
      </div>
      <div class="msg-body">${sanitize(m.message)}</div>
      <div class="msg-actions">
        <button class="like-btn ${liked ? 'liked' : ''}"
                id="like-${m.id}" onclick="toggleLike('${m.id}')">
          <span class="like-icon">◆</span>
          <span class="like-num" id="likes-${m.id}">${m.likes || 0}</span>
          <span class="btn-label">${liked ? 'LOCKED' : 'SIGNAL'}</span>
        </button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('load-more-btn').style.display =
    allMessages.length > displayedN ? 'block' : 'none';
}

function setSort(mode) {
  currentSort = mode;
  document.getElementById('sort-new').classList.toggle('active', mode === 'new');
  document.getElementById('sort-top').classList.toggle('active', mode === 'top');
  allMessages.sort(mode === 'new'
    ? (a,b) => b.ts - a.ts
    : (a,b) => (b.likes||0) - (a.likes||0));
  displayedN = PAGE_SIZE;
  renderMessages();
}

function loadMore() {
  displayedN += PAGE_SIZE;
  renderMessages();
}

/* ═══════════════════════ LOAD ══════════════════════════ */
async function loadMessages() {
  try {
    const data = await fbGet('/guestbook');
    allMessages = data
      ? Object.entries(data).map(([id, m]) => ({ id, ...m }))
      : [];
    allMessages.sort((a,b) => b.ts - a.ts);
    document.getElementById('msg-count').textContent = allMessages.length;
    renderMessages();
  } catch(e) {
    document.getElementById('msg-list').innerHTML =
      `<div class="empty-state"><div class="empty-text">
        Signal lost — could not load messages. Check connection.
      </div></div>`;
  }
}

/* ═══════════════════════ SUBMIT ════════════════════════ */
async function submitMessage() {
  const nameEl   = document.getElementById('gb-name');
  const msgEl    = document.getElementById('gb-msg');
  const anonEl   = document.getElementById('gb-anon');
  const statusEl = document.getElementById('submit-status');
  const btn      = document.getElementById('submit-btn');

  const rawName = nameEl.value.trim();
  const rawMsg  = msgEl.value.trim();
  const isAnon  = anonEl.checked;

  if (!isAnon && !rawName) {
    statusEl.className = 'err'; statusEl.textContent = '✗ Callsign required.'; return;
  }
  if (!rawMsg) {
    statusEl.className = 'err'; statusEl.textContent = '✗ Message is empty.'; return;
  }
  if (rawMsg.length > 500) {
    statusEl.className = 'err'; statusEl.textContent = '✗ Exceeds 500 characters.'; return;
  }

  /* rate limit */
  const lastSent = parseInt(localStorage.getItem('gb_last') || '0');
  if (Date.now() - lastSent < COOLDOWN) {
    const wait = Math.ceil((COOLDOWN - (Date.now() - lastSent)) / 1000);
    statusEl.className = 'err';
    statusEl.textContent = `✗ Cooldown — ${wait}s remaining.`;
    startCooldownBar(wait);
    return;
  }

  btn.disabled = true;
  btn.classList.add('sending');
  btn.textContent = '◌  TRANSMITTING…';
  statusEl.className = 'wait'; statusEl.textContent = 'Uplink in progress…';

  try {
    const payload = {
      name:         isAnon ? 'Anonymous' : rawName,
      message:      rawMsg,
      ts:           Date.now(),
      likes:        0,
      city:         visitorGeo?.city         || null,
      country:      visitorGeo?.country_name || null,
      country_code: visitorGeo?.country_code || null
    };

    const res = await fbPost('/guestbook', payload);
    if (!res) throw new Error('no response');

    allMessages.unshift({ id: res.name, ...payload });
    if (currentSort === 'top') allMessages.sort((a,b) => (b.likes||0) - (a.likes||0));
    document.getElementById('msg-count').textContent = allMessages.length;
    renderMessages();

    nameEl.value = '';
    msgEl.value  = '';
    anonEl.checked = false;
    nameEl.disabled = false;
    nameEl.style.opacity = '1';
    document.getElementById('char-counter').textContent = '0 / 500';
    document.getElementById('char-counter').className = 'char-counter';

    localStorage.setItem('gb_last', Date.now().toString());
    statusEl.className = 'ok'; statusEl.textContent = '✓ Signal transmitted!';
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 5000);
  } catch(e) {
    statusEl.className = 'err'; statusEl.textContent = '✗ Uplink failed — retry.';
  } finally {
    btn.disabled = false;
    btn.classList.remove('sending');
    btn.innerHTML = '▶&nbsp; TRANSMIT';
  }
}

function startCooldownBar(totalSec) {
  const wrap = document.getElementById('cooldown-wrap');
  const bar  = document.getElementById('cooldown-bar');
  wrap.style.display = 'block';
  bar.style.width = '100%';
  bar.style.transition = 'none';
  void bar.offsetWidth;
  bar.style.transition = `width ${totalSec}s linear`;
  bar.style.width = '0%';
  setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '100%'; }, totalSec * 1000 + 100);
}

/* ═══════════════════════ LIKE ══════════════════════════ */
async function toggleLike(id) {
  const alreadyLiked = likedIds.includes(id);
  const msg = allMessages.find(m => m.id === id);
  if (!msg) return;

  const btn    = document.getElementById(`like-${id}`);
  const numEl  = document.getElementById(`likes-${id}`);
  const lbl    = btn.querySelector('.btn-label');
  btn.disabled = true;

  try {
    const current  = (await fbGet(`/guestbook/${id}/likes`)) || 0;
    const newCount = alreadyLiked ? Math.max(0, current - 1) : current + 1;
    await fbPut(`/guestbook/${id}/likes`, newCount);
    msg.likes = newCount;

    /* run animation */
    animateLike(btn, numEl, newCount, !alreadyLiked);

    if (alreadyLiked) {
      likedIds = likedIds.filter(x => x !== id);
      btn.classList.remove('liked');
      if (lbl) lbl.textContent = 'SIGNAL';
    } else {
      likedIds.push(id);
      btn.classList.add('liked');
      if (lbl) lbl.textContent = 'LOCKED';
    }
    localStorage.setItem('gb_liked', JSON.stringify(likedIds));
  } catch(e) { /* silently ignore */ }
  finally { btn.disabled = false; }
}

/* ═══════════════════════ CHAR COUNTER ═══════════════════ */
document.getElementById('gb-msg').addEventListener('input', function() {
  const n  = this.value.length;
  const el = document.getElementById('char-counter');
  el.textContent = `${n} / 500`;
  el.className = 'char-counter' + (n > 450 ? (n > 490 ? ' over' : ' warn') : '');
});

/* anonymous toggle */
document.getElementById('gb-anon').addEventListener('change', function() {
  const f = document.getElementById('gb-name');
  f.disabled = this.checked;
  f.style.opacity = this.checked ? '0.32' : '1';
  if (this.checked) f.value = '';
});

/* Ctrl+Enter to submit */
document.getElementById('gb-msg').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') submitMessage();
});

/* ═══════════════════════ INIT ══════════════════════════ */
(async function init() {
  getGeo().then(g => { visitorGeo = g; }).catch(() => {});
  await loadMessages();
})();
</script>
